<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eaeaea; border-radius: 5px; }
        .header { background-color: #ef4444; color: white; padding: 10px 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.8em; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Order Confirmed! 🍕</h2>
        </div>
        <div class="content">
            <p>Hi there,</p>
            <p>Your order has been received and is being prepared!</p>
            <p><strong>Order ID:</strong> {{orderId}}</p>
            <p><strong>Total Amount:</strong> ₹{{totalAmount}}</p>
            <p>You can track your order status in your dashboard.</p>
        </div>
        <div class="footer">
            <p>Thank you for choosing Pizza Shop!</p>
        </div>
    </div>
</body>
</html>
